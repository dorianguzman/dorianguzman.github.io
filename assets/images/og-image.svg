<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Shadow filter for card depth -->
    <filter id="cardShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="16"/>
      <feOffset dx="0" dy="8" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.15"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Shadow filter for name text -->
    <filter id="textShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Google Fonts - Archivo Bold -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@700;900&amp;display=swap');

      .name {
        font-family: 'Archivo', sans-serif;
        font-weight: 900;
        font-size: 72px;
        fill: #0F172A;
        text-anchor: middle;
      }

      .expertise {
        font-family: 'Archivo', sans-serif;
        font-weight: 700;
        font-size: 44px;
        fill: #0891B2;
        text-anchor: middle;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#F1F5F9"/>

  <!-- Card with shadow and subtle border -->
  <rect x="100" y="100" width="1000" height="430" rx="20" fill="white" stroke="rgba(0,0,0,0.05)" stroke-width="1" filter="url(#cardShadow)"/>

  <!-- Text content -->
  <text x="600" y="240" class="name" filter="url(#textShadow)">Dorian Guzman</text>

  <!-- Line under name -->
  <line x1="350" y1="270" x2="850" y2="270" stroke="#0891B2" stroke-width="5" opacity="0.4"/>

  <text x="600" y="320" class="expertise">Strategy</text>
  <text x="600" y="385" class="expertise">Agentic AI Systems</text>
  <text x="600" y="450" class="expertise">Quantitative Research</text>
</svg>
